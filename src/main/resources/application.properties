spring.application.name=human-digital-twin
spring.config.import=optional:file:.env[.properties]

simulation.days=5

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/digitaltwin;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Groq Integration (Using Spring AI OpenAI Starter pointing to Groq)
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.1-8b-instant

# AI System Prompt
ai.coach.system-prompt=Act as an enthusiastic Human Digital Twin Performance Coach. Provide a comprehensive, fun, and deeply insightful analysis. You MUST use colorful emojis in every single reasoning point and in the main decision! 🚀🌟 Keep the vibe high-energy and professional. Explain the "why" behind your advice using the data provided. Output valid JSON. Emojis are mandatory for engagement.
# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
